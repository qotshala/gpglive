<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD POINT - LIVE GOLD</title>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #D4AF37; box-sizing: border-box; }
        h1 { font-size: 16px; text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Boxi i Bursës Live */
        .live-card { background: linear-gradient(145deg, #1a1a1a, #000); padding: 20px; border-radius: 12px; border: 1px solid #444; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .live-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        .live-price { font-size: 32px; color: #00ff00; font-weight: bold; }
        .sub-price { font-size: 14px; color: #D4AF37; margin-top: 5px; }
        .update-time { font-size: 9px; color: #555; margin-top: 10px; font-style: italic; }

        /* Llogaritësi */
        .section { background: #1a1a1a; padding: 15px; border-radius: 12px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #D4AF37; border-radius: 8px; padding: 15px; color: #fff; font-size: 24px; text-align: center; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        input::placeholder { color: #333; }
        
        .result-box { margin-top: 10px; text-align: center; padding: 10px; border-top: 1px dashed #333; }
        .total-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .total-val { color: #fff; font-weight: bold; font-size: 30px; letter-spacing: 1px; }
    </style>
</head>
<body onload="getGoldPrice()">

<div class="container">
    <h1>Gold Point Ari</h1>

    <div class="live-card">
        <div class="live-label">Çmimi i Arit Live (Bursa)</div>
        <div id="goldGramEur" class="live-price">...</div>
        <div id="goldOunceUsd" class="sub-price">Duke u lidhur...</div>
        <div id="status" class="update-time">Duke marrë të dhënat...</div>
    </div>

    <div class="section">
        <label>Llogaritësi i Gramëve</label>
        <input type="number" id="gram" oninput="doMath()" placeholder="Sa gram (g)" inputmode="decimal">
        <label>Çmimi për Gram (CZK)</label>
        <input type="number" id="price" oninput="doMath()" placeholder="Çmimi në CZK" inputmode="decimal">
        
        <div class="result-box">
            <div class="total-label">TOTALI PËR T'U PAGUAR:</div>
            <div id="totalCzk" class="total-val">0 CZK</div>
        </div>
    </div>
</div>

<script>
    // Funksioni që merr çmimin live
    async function getGoldPrice() {
        try {
            const resp = await fetch('https://api.metals.live/v1/spot');
            const data = await resp.json();
            
            // Gold vjen në USD per Ounce
            const usdOunce = parseFloat(data[0].gold);
            // Kthehet në Euro per Gram (Kursi mesatar EUR/USD 0.92)
            const eurGram = (usdOunce / 31.1035) * 0.92;

            document.getElementById('goldGramEur').innerText = eurGram.toFixed(2) + " € / g";
            document.getElementById('goldOunceUsd').innerText = usdOunce.toLocaleString() + " $ / oz";
            document.getElementById('status').innerText = "Update: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('goldOunceUsd').innerText = "Gabim lidhjeje";
            document.getElementById('goldGramEur').innerText = "---";
        }
    }

    // Llogaritja pa NaN
    function doMath() {
        const g = parseFloat(document.getElementById('gram').value) || 0;
        const p = parseFloat(document.getElementById('price').value) || 0;
        const total = g * p;
        
        document.getElementById('totalCzk').innerText = Math.round(total).toLocaleString() + " CZK";
    }

    // Rifreskoje çdo 2 minuta
    setInterval(getGoldPrice, 120000);
</script>

</body>
</html>
