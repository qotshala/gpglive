<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPG - Manažer Skladu</title>
    <style>
        :root { --gold: #BF9B30; --bg: #ffffff; --card: #fdfdfd; --text: #111; --border: #eee; --red: #e74c3c; --green: #27ae60; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        h1 { color: var(--gold); text-align: center; font-size: 1.4rem; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        /* Formular */
        .admin-panel { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        
        .btn { border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-add { background: var(--gold); color: white; }
        .btn-sell { background: var(--green); color: white; font-size: 0.7rem; }
        .btn-undo { background: #3498db; color: white; font-size: 0.7rem; }
        .btn-del { background: var(--red); color: white; font-size: 0.7rem; }

        /* Grida e Dyqaneve */
        .shop-grid { display: flex; flex-direction: column; gap: 20px; }
        .column { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .column h2 { color: var(--gold); font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 0; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; }
        th { background: #f4f4f4; }

        /* Tabela e te shiturave */
        .sold-section { margin-top: 40px; border: 2px solid var(--red); padding: 10px; border-radius: 8px; }
        .sold-section h2 { color: var(--red); font-size: 1.1rem; }
    </style>
</head>
<body>

<h1>GOLD POINT GROUP</h1>

<div class="admin-panel">
    <div class="form-row">
        <select id="res-shop"><option value="GPG">GOLD POINT</option><option value="LBX">MELANTRICHOVA</option><option value="PALL">PALLADIUM</option></select>
        <input type="text" id="res-kod" placeholder="Kód Modelu">
        <select id="res-typ"><option value="D">Dámský</option><option value="P">Pánský</option></select>
        <input type="text" id="res-mm" placeholder="MM (př. 4mm)">
        <select id="res-barva"><option value="Žluté">Žluté</option><option value="Bílé">Bílé</option><option value="Rose">Rose</option></select>
        <input type="number" id="res-vel" placeholder="Velikost">
    </div>
    <button class="btn btn-add" onclick="addItem()">+ PŘIDAT DO SKLADU</button>
</div>

<div class="shop-grid">
    <div class="column"><h2>GOLD POINT</h2><table id="table-GPG"><thead><tr><th>Model</th><th>Vel.</th><th>Akce</th></tr></thead><tbody></tbody></table></div>
    <div class="column"><h2>MELANTRICHOVA</h2><table id="table-LBX"><thead><tr><th>Model</th><th>Vel.</th><th>Akce</th></tr></thead><tbody></tbody></table></div>
    <div class="column"><h2>PALLADIUM</h2><table id="table-PALL"><thead><tr><th>Model</th><th>Vel.</th><th>Akce</th></tr></thead><tbody></tbody></table></div>
</div>

<div class="sold-section">
    <h2>🔴 VÝPIS PRODANÝCH (SHITUR)</h2>
    <table id="table-sold">
        <thead><tr><th>Pôvod</th><th>Model</th><th>Vel.</th><th>Akce</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('gpg_manual_db')) || [];

    function addItem() {
        const item = {
            id: Date.now(),
            shop: document.getElementById('res-shop').value,
            kod: document.getElementById('res-kod').value,
            typ: document.getElementById('res-typ').value,
            mm: document.getElementById('res-mm').value,
            barva: document.getElementById('res-barva').value,
            vel: document.getElementById('res-vel').value,
            sold: false
        };
        if(!item.kod || !item.vel) return alert("Doplňte kód a velikost!");
        inventory.push(item);
        save();
    }

    function changeStatus(id, status) {
        const idx = inventory.findIndex(i => i.id === id);
        if(idx !== -1) {
            inventory[idx].sold = status;
            save();
        }
    }

    function deleteItem(id) {
        if(confirm("Smazat trvale?")) {
            inventory = inventory.filter(i => i.id !== id);
            save();
        }
    }

    function save() {
        localStorage.setItem('gpg_manual_db', JSON.stringify(inventory));
        render();
    }

    function render() {
        ['GPG', 'LBX', 'PALL'].forEach(s => {
            const tbody = document.querySelector(`#table-${s} tbody`);
            tbody.innerHTML = '';
            inventory.filter(i => i.shop === s && !i.sold).forEach(i => {
                tbody.innerHTML += `<tr>
                    <td><b>${i.kod}</b><br>${i.barva} (${i.mm})</td>
                    <td><b>${i.vel}</b><br>${i.typ}</td>
                    <td><button class="btn-sell" onclick="changeStatus(${i.id}, true)">PRODAT</button></td>
                </tr>`;
            });
        });

        const soldBody = document.querySelector('#table-sold tbody');
        soldBody.innerHTML = '';
        inventory.filter(i => i.sold).forEach(i => {
            soldBody.innerHTML += `<tr>
                <td>${i.shop}</td>
                <td><b>${i.kod}</b></td>
                <td><b>${i.vel}</b></td>
                <td>
                    <button class="btn-undo" onclick="changeStatus(${i.id}, false)">ZPĚT</button>
                    <button class="btn-del" onclick="deleteItem(${i.id})">X</button>
                </td>
            </tr>`;
        });
    }
    render();
</script>
</body>
</html>
