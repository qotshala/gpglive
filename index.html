<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD PRICE LIVE</title>
    <style>
        body { 
            background-color: #000; 
            color: #D4AF37; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            padding: 30px; 
            border: 2px solid #D4AF37; 
            border-radius: 20px; 
            background: #111;
            width: 80%;
            max-width: 400px;
        }
        .label { 
            font-size: 14px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .price { 
            font-size: 48px; 
            font-weight: bold; 
            color: #00ff00; 
            margin: 10px 0;
        }
        .unit {
            font-size: 20px;
            color: #D4AF37;
        }
        .time {
            font-size: 10px;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="label">Çmimi i Arit (Live)</div>
    <div id="goldPrice" class="price">...</div>
    <div class="unit">Euro për Gram (€/g)</div>
    <div id="updateTime" class="time">Duke u lidhur me bursën...</div>
</div>

<script>
    async function fetchGold() {
        try {
            // Përdorim një API të hapur për çmimet e metaleve
            const response = await fetch('https://api.gold-api.com/api/v1/gold');
            const data = await response.json();
            
            // Çmimi vjen direkt për gram ose ounce, e kthejmë në Euro/Gram
            // Ky API zakonisht jep çmimin global në USD, e kthejmë me kursin 0.92
            const priceInUsd = data.price; 
            const priceInEur = priceInUsd * 0.92;

            document.getElementById('goldPrice').innerText = priceInEur.toFixed(2);
            document.getElementById('updateTime').innerText = "Përditësuar: " + new Date().toLocaleTimeString();
        } catch (error) {
            document.getElementById('goldPrice').innerText = "Error";
            document.getElementById('updateTime').innerText = "Nuk mund të merren të dhënat";
        }
    }

    // Ekzekutoje menjëherë
    fetchGold();
    
    // Rifreskoje çdo 60 sekonda
    setInterval(fetchGold, 60000);
</script>

</body>
</html>
