<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPG - Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #BF9B30; --bg: #ffffff; --text: #111; --border: #eee; --red: #e74c3c; --green: #27ae60; --blue: #3498db; --orange: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; visibility: hidden; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; visibility: visible; }
        #login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 280px; }
        #pass-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1.1rem; }
        #login-btn { width: 100%; padding: 12px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: bold; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; }
        h1 { color: var(--gold); margin: 0; font-size: 0.9rem; text-transform: uppercase; }
        .admin-panel { background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; }
        .btn { border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--gold); color: white; width: 100%; margin-top: 10px; }
        .shop-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 1024px) { .shop-grid { grid-template-columns: repeat(3, 1fr); } }
        .column { border: 1px solid var(--border); border-radius: 12px; padding: 10px; background: #fff; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .row-yellow { background: #fff9e6; } .row-white { background: #f2f2f2; }
        .sold-section { margin-top: 30px; border-top: 4px solid var(--red); padding-top: 20px; }
        @media print { .admin-panel, #login-overlay, .btn-edit, .btn-sell, .btn-undo, .btn-del { display: none !important; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div id="login-box">
        <h2>GPG INVENTORY</h2>
        <input type="password" id="pass-input" autocapitalize="none" autocomplete="off">
        <button id="login-btn" onclick="checkPass()">ENTER</button>
    </div>
</div>

<div id="app-content">
    <div class="header">
        <h1>GOLD POINT GROUP</h1>
        <button class="btn" style="background:#eee; font-size:10px;" onclick="requestNotificationPermission()">🔔 NOTIFY</button>
        <button class="btn" style="background:var(--red); color:white; font-size:10px;" onclick="window.print()">🖨️ PRINT</button>
    </div>

    <div class="admin-panel">
        <div class="form-row">
            <select id="res-shop"><option value="GPG">GOLD POINT</option><option value="LBX">MELANTRICHOVA</option><option value="PALL">PALLADIUM</option></select>
            <input type="text" id="res-kod" placeholder="Code">
            <input type="text" id="res-mm" placeholder="MM">
            <select id="res-barva"><option value="Yellow">Yellow Gold</option><option value="White">White Gold</option><option value="Rose">Rose Gold</option></select>
            <input type="text" id="res-vel" placeholder="Size">
        </div>
        <button class="btn btn-add" id="main-btn" onclick="handleAction()">+ ADD TO INVENTORY</button>
    </div>

    <div class="shop-grid">
        <div class="column"><h2>STOCK: GPG</h2><table id="table-GPG"><tbody></tbody></table></div>
        <div class="column"><h2>STOCK: LBX</h2><table id="table-LBX"><tbody></tbody></table></div>
        <div class="column"><h2>STOCK: PALL</h2><table id="table-PALL"><tbody></tbody></table></div>
    </div>

    <div class="sold-section">
        <div class="shop-grid">
            <div class="column"><h2>SOLD: GPG</h2><table id="table-sold-GPG"><tbody></tbody></table></div>
            <div class="column"><h2>SOLD: LBX</h2><table id="table-sold-LBX"><tbody></tbody></table></div>
            <div class="column"><h2>SOLD: PALL</h2><table id="table-sold-PALL"><tbody></tbody></table></div>
        </div>
    </div>
</div>

<script>
    const MASTER_PASS = "kasa";
    const S_URL = "https://sudafhyeiyqflupjberp.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1ZGFmaHllaXlxZmx1cGpiZXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDI3NjEsImV4cCI6MjA4OTY3ODc2MX0.7JmqOiSRiBo8qEHOkIhhhZv6I3zURuJdWNhe4x12LIs";
    const _supabase = supabase.createClient(S_URL, S_KEY);

    // Login & Persistence
    function checkPass() {
        if(document.getElementById('pass-input').value.toLowerCase() === MASTER_PASS) {
            localStorage.setItem('gpg_auth', new Date().getTime());
            unlockPage();
        } else { alert("Wrong!"); }
    }
    function unlockPage() { document.getElementById('login-overlay').style.display='none'; document.body.style.visibility='visible'; }
    window.onload = () => { if(localStorage.getItem('gpg_auth')) unlockPage(); else document.body.style.visibility='visible'; };

    // Service Worker & Notifications
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    async function requestNotificationPermission() {
        const perm = await Notification.requestPermission();
        if (perm === 'granted') alert("Notifications Enabled!");
    }

    // Realtime Listener
    _supabase.channel('any').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'inventory' }, payload => {
        if (payload.new.sold && !payload.old.sold) {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification("🔴 SHITJE E RE!", { body: `Modeli: ${payload.new.kod} ne ${payload.new.shop}` });
                });
            }
        }
        loadData();
    }).subscribe();

    let inventory = [];
    let editModeId = null;

    async function loadData() {
        const { data } = await _supabase.from('inventory').select('*').order('id', { ascending: false });
        inventory = data || [];
        render();
    }

    function handleAction() { if(editModeId) updateItem(); else addItem(); }

    async function addItem() {
        const kod = document.getElementById('res-kod').value;
        const vel = document.getElementById('res-vel').value;
        if(!kod || !vel) return;
        await _supabase.from('inventory').insert([{
            shop: document.getElementById('res-shop').value,
            kod: kod, mm: document.getElementById('res-mm').value,
            barva: document.getElementById('res-barva').value,
            vel: vel, sold: false
        }]);
        document.getElementById('res-vel').value = '';
        loadData();
    }

    async function sellItem(id) {
        if(confirm("Sell this?")) {
            const d = new Date();
            await _supabase.from('inventory').update({ sold: true, data_shitjes: `${d.getDate()}/${d.getMonth()+1}` }).eq('id', id);
            loadData();
        }
    }

    function render() {
        const shops = ['GPG', 'LBX', 'PALL'];
        shops.forEach(s => {
            const stockBody = document.querySelector(`#table-${s} tbody`);
            const soldBody = document.querySelector(`#table-sold-${s} tbody`);
            stockBody.innerHTML = ''; soldBody.innerHTML = '';
            
            inventory.filter(i => i.shop === s).forEach(i => {
                const row = `<tr class="${i.barva === 'Yellow' ? 'row-yellow' : ''}">
                    <td><b>${i.kod}</b><br><small>${i.barva} ${i.mm}</small></td>
                    <td>${i.vel}</td>
                    <td>${i.sold ? i.data_shitjes : `<button class="btn" style="background:var(--green); color:white;" onclick="sellItem(${i.id})">SELL</button>`}</td>
                </tr>`;
                if(i.sold) soldBody.innerHTML += row; else stockBody.innerHTML += row;
            });
        });
    }

    loadData();
</script>
</body>
</html>
