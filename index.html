<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD POINT LIVE</title>
    <style>
        body { 
            background-color: #000; 
            color: #D4AF37; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; width: 90%; max-width: 400px; }
        .card {
            background: #111;
            border: 2px solid #D4AF37;
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .label { font-size: 14px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .price { font-size: 55px; font-weight: bold; color: #fff; margin: 0; }
        .unit { font-size: 18px; color: #D4AF37; font-weight: bold; margin-top: 5px; }
        .karat-14 { color: #00ff00; } 
        .time { font-size: 11px; color: #444; margin-top: 15px; }
        button { 
            background: #222; color: #D4AF37; border: 1px solid #D4AF37; 
            padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card">
        <div class="label">Ari 24 Karat (Bursa)</div>
        <div id="gold24" class="price">...</div>
        <div class="unit">€ / Gram</div>
    </div>

    <div class="card" style="border-color: #00ff00;">
        <div class="label">Ari 14 Karat (585)</div>
        <div id="gold14" class="price karat-14">...</div>
        <div class="unit" style="color: #00ff00;">€ / Gram</div>
    </div>

    <button onclick="fetchGold()">Rifresko</button>
    <div id="updateTime" class="time">Duke u lidhur...</div>
</div>

<script>
    async function fetchGold() {
        const timeDisplay = document.getElementById('updateTime');
        timeDisplay.innerText = "Duke u përditësuar...";

        try {
            // Përdorim një PROXY që të mos bllokohet nga telefoni
            const proxy = "https://api.allorigins.win/get?url=";
            const target = encodeURIComponent("https://api.coinbase.com/v2/prices/XAU-EUR/spot");
            
            const response = await fetch(proxy + target);
            const data = await response.json();
            const result = JSON.parse(data.contents);
            
            if (result && result.data) {
                const priceOunce = parseFloat(result.data.amount);
                const price24 = priceOunce / 31.1035; 
                const price14 = price24 * 0.585; 

                document.getElementById('gold24').innerText = price24.toFixed(2);
                document.getElementById('gold14').innerText = price14.toFixed(2);
                timeDisplay.innerText = "Përditësuar: " + new Date().toLocaleTimeString();
            }
        } catch (error) {
            console.error(error);
            timeDisplay.innerText = "Lidhja dështoi. Kontrollo internetin.";
        }
    }

    // Ekzekuto menjëherë
    fetchGold();
    
    // Rifresko çdo 5 minuta
    setInterval(fetchGold, 300000);
</script>

</body>
</html>
