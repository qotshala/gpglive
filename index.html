<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPG Premium Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F9E4B7;
            --dark: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --red: #ff5e5e;
            --green: #2ecc71;
            --blue: #3498db;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--dark); color: var(--text); margin: 0; padding: 0; padding-bottom: 50px;
        }

        /* Login Overlay */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 10000; 
        }
        .login-card {
            background: var(--card-bg); padding: 40px 30px; border-radius: 25px;
            border: 1px solid var(--gold); text-align: center; width: 90%; max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-card h2 { color: var(--gold); margin-bottom: 20px; letter-spacing: 2px; }
        #pass-input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: #000; color: white; text-align: center; font-size: 1.2rem; margin-bottom: 20px;
        }

        /* Main Header */
        header {
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 20px; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        header h1 { color: var(--gold); margin: 0; font-size: 1.2rem; font-weight: 800; }

        /* Form Styling */
        .admin-panel { padding: 15px; background: #1a1a1a; margin: 10px; border-radius: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        
        input, select { 
            background: #2a2a2a; border: 1px solid #444; color: white;
            padding: 12px; border-radius: 10px; font-size: 1rem; width: 100%;
        }

        .btn { 
            border: none; border-radius: 12px; padding: 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-main { background: var(--gold); color: black; margin-top: 10px; }
        .btn-update { background: var(--blue); color: white; margin-top: 10px; }

        /* Inventory Cards */
        .shop-title { color: var(--gold); padding: 10px 20px; font-size: 1.1rem; border-left: 4px solid var(--gold); margin: 20px 0 10px 10px; }
        .card-container { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 10px; }
        @media (min-width: 768px) { .card-container { grid-template-columns: repeat(3, 1fr); } }

        .item-card {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 6px solid #444; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .item-card.yellow { border-left-color: #f1c40f; }
        .item-card.white { border-left-color: #ecf0f1; }
        .item-card.rose { border-left-color: #e67e22; }

        .item-info b { font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .item-info span { font-size: 0.8rem; color: #aaa; }
        .size-tag { background: #333; padding: 5px 10px; border-radius: 8px; font-weight: bold; color: var(--gold); }

        .actions { display: flex; gap: 8px; }
        .btn-sm { padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; }
        .btn-sell { background: var(--green); color: white; }
        .btn-edit { background: #444; color: white; }
        .btn-undo { background: var(--blue); color: white; }
        .btn-del { background: var(--red); color: white; }

        .sold-badge { font-size: 0.7rem; background: #000; padding: 4px 8px; border-radius: 5px; color: var(--red); display: block; margin-top: 5px; }

        @media print { .admin-panel, .actions, header, #login-overlay { display: none; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>GPG SECURE</h2>
        <input type="password" id="pass-input" placeholder="Password" autocapitalize="none">
        <button class="btn btn-main" style="width: 100%;" onclick="checkPass()">LOGIN</button>
    </div>
</div>

<header>
    <h1>GOLD POINT GROUP</h1>
    <button class="btn" style="background:#222; color:var(--gold); border:1px solid var(--gold);" onclick="requestNotificationPermission()">🔔</button>
</header>

<div class="admin-panel" id="top-form">
    <div class="form-grid">
        <select id="res-shop" class="full-width">
            <option value="GPG">GOLD POINT (Main)</option>
            <option value="LBX">MELANTRICHOVA</option>
            <option value="PALL">PALLADIUM</option>
        </select>
        <input type="text" id="res-kod" placeholder="Model Code">
        <input type="text" id="res-mm" placeholder="MM Width">
        <select id="res-barva">
            <option value="Yellow">Yellow Gold</option>
            <option value="White">White Gold</option>
            <option value="Rose">Rose Gold</option>
            <option value="Mix">Yellow & White</option>
        </select>
        <input type="text" id="res-vel" placeholder="Size">
    </div>
    <button class="btn btn-main" id="main-btn" onclick="handleAction()">+ ADD TO INVENTORY</button>
</div>

<div id="shop-sections">
    <div class="shop-title">STOCK: GOLD POINT</div>
    <div id="stock-GPG" class="card-container"></div>
    
    <div class="shop-title">STOCK: MELANTRICHOVA</div>
    <div id="stock-LBX" class="card-container"></div>
    
    <div class="shop-title">STOCK: PALLADIUM</div>
    <div id="stock-PALL" class="card-container"></div>
</div>

<div class="sold-section" style="margin-top: 50px; background: #000; padding-top: 20px;">
    <h2 style="text-align:center; color:var(--red);">🔴 SOLD HISTORY</h2>
    <div id="sold-items" class="card-container"></div>
</div>

<script>
    const MASTER_PASS = "kasa";
    const S_URL = "https://sudafhyeiyqflupjberp.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1ZGFmaHllaXlxZmx1cGpiZXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDI3NjEsImV4cCI6MjA4OTY3ODc2MX0.7JmqOiSRiBo8qEHOkIhhhZv6I3zURuJdWNhe4x12LIs";
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let inventory = [];
    let editModeId = null;

    // Push Notify Setup
    const PUSH_USER = "qoti";
    const PUSH_CODE = "539077";

    async function sendPush(title, msg) {
        const url = `https://pushnotify.co.uk/send/?userid=${PUSH_USER}&code=${PUSH_CODE}&txt=${encodeURIComponent(title + ": " + msg)}`;
        try { fetch(url, { mode: 'no-cors' }); } catch(e) {}
    }

    // Auth
    function checkPass() {
        if(document.getElementById('pass-input').value.toLowerCase() === MASTER_PASS) {
            localStorage.setItem('gpg_auth_pro', 'true');
            document.getElementById('login-overlay').style.display='none';
        } else { alert("Access Denied"); }
    }
    if(localStorage.getItem('gpg_auth_pro')) document.getElementById('login-overlay').style.display='none';

    // Realtime
    _supabase.channel('db').on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, payload => {
        if (payload.eventType === 'UPDATE' && payload.new.sold && !payload.old.sold) {
            sendPush("🔴 SHITJE E RE", `${payload.new.kod} (${payload.new.shop})`);
        }
        loadData();
    }).subscribe();

    async function loadData() {
        const { data } = await _supabase.from('inventory').select('*').order('id', { ascending: false });
        inventory = data || [];
        render();
    }

    function handleAction() { if(editModeId) updateItem(); else addItem(); }

    async function addItem() {
        const kod = document.getElementById('res-kod').value;
        if(!kod) return;
        await _supabase.from('inventory').insert([{
            shop: document.getElementById('res-shop').value,
            kod: kod, mm: document.getElementById('res-mm').value,
            barva: document.getElementById('res-barva').value,
            vel: document.getElementById('res-vel').value, sold: false
        }]);
        resetForm();
        loadData();
    }

    function startEdit(id) {
        const i = inventory.find(x => x.id === id);
        editModeId = id;
        document.getElementById('res-shop').value = i.shop;
        document.getElementById('res-kod').value = i.kod;
        document.getElementById('res-mm').value = i.mm;
        document.getElementById('res-barva').value = i.barva;
        document.getElementById('res-vel').value = i.vel;
        const btn = document.getElementById('main-btn');
        btn.innerText = "💾 SAVE CHANGES";
        btn.className = "btn btn-update";
        window.scrollTo(0,0);
    }

    async function updateItem() {
        await _supabase.from('inventory').update({
            shop: document.getElementById('res-shop').value,
            kod: document.getElementById('res-kod').value,
            mm: document.getElementById('res-mm').value,
            barva: document.getElementById('res-barva').value,
            vel: document.getElementById('res-vel').value
        }).eq('id', editModeId);
        editModeId = null;
        resetForm();
        loadData();
    }

    async function sellItem(id) {
        if(confirm("Mark as SOLD?")) {
            const d = new Date();
            const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
            await _supabase.from('inventory').update({ sold: true, data_shitjes: dateStr }).eq('id', id);
        }
    }

    async function undoSell(id) {
        if(confirm("Return to stock?")) {
            await _supabase.from('inventory').update({ sold: false, data_shitjes: null }).eq('id', id);
        }
    }

    async function deleteItem(id) {
        if(confirm("Delete permanently?")) {
            await _supabase.from('inventory').delete().eq('id', id);
        }
    }

    function resetForm() {
        document.getElementById('res-kod').value = '';
        document.getElementById('res-vel').value = '';
        document.getElementById('main-btn').innerText = "+ ADD TO INVENTORY";
        document.getElementById('main-btn').className = "btn btn-main";
    }

    function render() {
        const shops = ['GPG', 'LBX', 'PALL'];
        shops.forEach(s => document.getElementById(`stock-${s}`).innerHTML = '');
        document.getElementById('sold-items').innerHTML = '';

        inventory.forEach(i => {
            const colorClass = i.barva.toLowerCase();
            const card = `
                <div class="item-card ${colorClass}">
                    <div class="item-info">
                        <span>${i.shop} | ${i.barva} Gold</span>
                        <b>${i.kod}</b>
                        <small>${i.mm || ''} mm</small>
                        ${i.sold ? `<span class="sold-badge">SOLD: ${i.data_shitjes}</span>` : ''}
                    </div>
                    <div style="text-align:right;">
                        <div class="size-tag">${i.vel}</div>
                        <div class="actions" style="margin-top:10px;">
                            ${!i.sold ? `
                                <button class="btn btn-sm btn-edit" onclick="startEdit(${i.id})">✎</button>
                                <button class="btn btn-sm btn-sell" onclick="sellItem(${i.id})">SELL</button>
                            ` : `
                                <button class="btn btn-sm btn-edit" onclick="startEdit(${i.id})">✎</button>
                                <button class="btn btn-sm btn-undo" onclick="undoSell(${i.id})">↺</button>
                                <button class="btn btn-sm btn-del" onclick="deleteItem(${i.id})">X</button>
                            `}
                        </div>
                    </div>
                </div>
            `;

            if(i.sold) {
                document.getElementById('sold-items').innerHTML += card;
            } else {
                document.getElementById(`stock-${i.shop}`).innerHTML += card;
            }
        });
    }

    loadData();
</script>
</body>
</html>
