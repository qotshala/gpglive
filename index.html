        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .row:last-child { border-bottom: none; }
        
        .lab { color: #aaa; font-size: 14px; text-transform: uppercase; }
        .val { color: #fff; font-weight: bold; font-size: 22px; }
        .total-val { color: #00ff00; font-size: 35px; font-weight: bold; }

function calculateNeto() {
    const bruto = parseFloat(document.getElementById('brutoIn').value);
    const resBox = document.getElementById('resBox');
    
    if (!bruto || bruto < 2001) {
        resBox.style.display = "none";
        return;
    }

    let foundTier = tiers.find(t => bruto >= t.min && bruto <= t.max);

    if (foundTier) {
        let refund = foundTier.r;
        let neto = bruto - refund;
        
        document.getElementById('refundOut').innerText = refund.toLocaleString() + " CZK";
        document.getElementById('netoOut').innerText = neto.toLocaleString() + " CZK";
        document.getElementById('fashaInfo').innerText = "Fasha: " + foundTier.min + " - " + foundTier.max;
        resBox.style.display = "block";
    } else if (bruto > 100000) {
        // Për shumat mbi 100,000 ku rimbursimi është fiks 15%
        let refund = Math.round(bruto * 0.15);
        let neto = bruto - refund;
        document.getElementById('refundOut').innerText = refund.toLocaleString() + " CZK";
        document.getElementById('netoOut').innerText = neto.toLocaleString() + " CZK";
        document.getElementById('fashaInfo').innerText = "Mbi 100,000 (15%)";
        resBox.style.display = "block";
    } else {
        resBox.style.display = "none";
    }
}
