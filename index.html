<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPG Inventory Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #BF9B30; --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; --red: #e74c3c; --green: #27ae60; --blue: #3498db; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 14px; padding-bottom: 50px; }
        header { display: flex; justify-content: center; align-items: center; padding: 15px 5px; border-bottom: 2px solid var(--gold); margin-bottom: 15px; background: white; border-radius: 0 0 15px 15px; }
        header h1 { font-size: 1.1rem; color: var(--gold); margin: 0; letter-spacing: 1px; }
        .admin-panel { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input, select { padding: 11px; border-radius: 8px; border: 1px solid #ccc; width: 100%; font-size: 0.9rem; outline: none; }
        .btn-add { background: var(--gold); color: white; border: none; width: 100%; padding: 13px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-items: start; }
        .column h2 { font-size: 0.7rem; text-align: center; color: white; background: var(--gold); padding: 8px 2px; border-radius: 8px; margin-bottom: 12px; text-transform: uppercase; }
        .column.sold-col h2 { background: var(--red); }
        .item-card { background: var(--card); border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .yellow::before { background: #f1c40f; } .white::before { background: #bdc3c7; border: 1px solid #aaa; } .rose::before { background: #e67e22; } .mix::before { background: linear-gradient(to bottom, #f1c40f, #bdc3c7); }
        .item-card b { display: block; font-size: 0.85rem; margin-bottom: 2px; color: #000; }
        .size-tag { font-weight: bold; color: var(--gold); font-size: 0.85rem; margin: 4px 0; background: #fdf9ea; padding: 2px 4px; border-radius: 4px; align-self: flex-start; }
        .actions { display: flex; gap: 4px; margin-top: 5px; }
        .btn-act { border: none; padding: 7px 4px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-sell { background: var(--green); color: white; } .btn-edit { background: #f5f5f5; color: #333; border: 1px solid #ddd; } .btn-undo { background: var(--blue); color: white; } .btn-del { background: var(--red); color: white; }
        .sold-date { font-size: 0.65rem; color: var(--red); font-weight: bold; display: block; margin-top: 5px; text-align: center; border-top: 1px solid #feebeb; padding-top: 4px; }
    </style>
</head>
<body>

<header><h1>GOLD POINT GROUP</h1></header>

<div class="admin-panel">
    <div class="form-row">
        <select id="res-shop" style="grid-column: span 2;">
            <option value="GPG">GOLD POINT (GPG)</option>
            <option value="LBX">MELANTRICHOVA (LBX)</option>
            <option value="PALL">PALLADIUM (PALL)</option>
        </select>
        <input type="text" id="res-kod" placeholder="Code">
        <input type="text" id="res-mm" placeholder="MM">
        <select id="res-barva">
            <option value="Yellow">Yellow</option>
            <option value="White">White</option>
            <option value="Rose">Rose</option>
            <option value="Mix">Yellow & White</option>
        </select>
        <input type="text" id="res-vel" placeholder="Size">
    </div>
    <button class="btn-add" id="main-btn" onclick="handleAction()">+ ADD ITEM</button>
</div>

<div class="main-grid">
    <div class="column"><h2>GPG STOCK</h2><div id="stock-GPG"></div></div>
    <div class="column"><h2>LBX STOCK</h2><div id="stock-LBX"></div></div>
    <div class="column"><h2>PALL STOCK</h2><div id="stock-PALL"></div></div>
</div>

<div style="margin: 30px 0 10px; text-align: center;"><h3 style="color: var(--red); font-size: 0.9rem; border-top: 2px dashed #ccc; padding-top: 15px;">🔴 SOLD HISTORY</h3></div>

<div class="main-grid">
    <div class="column sold-col"><h2>GPG SOLD</h2><div id="sold-GPG"></div></div>
    <div class="column sold-col"><h2>LBX SOLD</h2><div id="sold-LBX"></div></div>
    <div class="column sold-col"><h2>PALL SOLD</h2><div id="sold-PALL"></div></div>
</div>

<script>
    const S_URL = "https://sudafhyeiyqflupjberp.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1ZGFmaHllaXlxZmx1cGpiZXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDI3NjEsImV4cCI6MjA4OTY3ODc2MX0.7JmqOiSRiBo8qEHOkIhhhZv6I3zURuJdWNhe4x12LIs";
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let inventory = [];
    let editModeId = null;

    _supabase.channel('db-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, () => loadData()).subscribe();

    async function sendPush(shopID, details) {
        let titleText = "";
        if(shopID === "GPG") titleText = "SHITJE E RE GOLD POINT";
        else if(shopID === "LBX") titleText = "SHITJE E RE MELANTRICHOVA";
        else if(shopID === "PALL") titleText = "SHITJE E RE NE PALLADIUM";

        fetch('https://ntfy.sh/goldsale_gpg', {
            method: 'POST',
            body: details,
            headers: { 'Title': titleText, 'Priority': '5', 'Tags': 'money,ring' }
        });
    }

    async function loadData() {
        const { data } = await _supabase.from('inventory').select('*').order('id', { ascending: false });
        inventory = data || [];
        render();
    }

    function handleAction() { if(editModeId) updateItem(); else addItem(); }

    async function addItem() {
        const kod = document.getElementById('res-kod').value;
        const vel = document.getElementById('res-vel').value;
        if(!kod || !vel) return;
        await _supabase.from('inventory').insert([{
            shop: document.getElementById('res-shop').value, kod: kod, 
            mm: document.getElementById('res-mm').value, barva: document.getElementById('res-barva').value,
            vel: vel, sold: false
        }]);
        resetForm(); loadData();
    }

    async function updateItem() {
        await _supabase.from('inventory').update({
            shop: document.getElementById('res-shop').value, kod: document.getElementById('res-kod').value,
            mm: document.getElementById('res-mm').value, barva: document.getElementById('res-barva').value,
            vel: document.getElementById('res-vel').value
        }).eq('id', editModeId);
        editModeId = null; resetForm(); loadData();
    }

    async function sellItem(id) {
        const item = inventory.find(x => x.id === id);
        if(confirm("Konfirmo shitjen: " + item.kod + "?")) {
            let details = `Unaza: ${item.kod}\nNgjyra: ${item.barva}\nMM: ${item.mm || 'N/A'}\nMadhësia: ${item.vel}`;
            sendPush(item.shop, details);

            const d = new Date();
            const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
            await _supabase.from('inventory').update({ sold: true, data_shitjes: dateStr }).eq('id', id);
            loadData();
        }
    }

    function startEdit(id) {
        const i = inventory.find(x => x.id === id);
        editModeId = id;
        document.getElementById('res-shop').value = i.shop;
        document.getElementById('res-kod').value = i.kod;
        document.getElementById('res-mm').value = i.mm || '';
        document.getElementById('res-barva').value = i.barva;
        document.getElementById('res-vel').value = i.vel;
        document.getElementById('main-btn').innerText = "SAVE CHANGES";
        window.scrollTo(0,0);
    }

    async function undoSell(id) { await _supabase.from('inventory').update({ sold: false, data_shitjes: null }).eq('id', id); loadData(); }
    async function deleteItem(id) { if(confirm("Delete?")) await _supabase.from('inventory').delete().eq('id', id); loadData(); }
    function resetForm() { document.getElementById('res-kod').value = ''; document.getElementById('res-mm').value = ''; document.getElementById('res-vel').value = ''; document.getElementById('main-btn').innerText = "+ ADD ITEM"; }

    function render() {
        const targets = ['stock-GPG', 'stock-LBX', 'stock-PALL', 'sold-GPG', 'sold-LBX', 'sold-PALL'];
        targets.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerHTML = ''; });
        inventory.forEach(i => {
            const containerId = (i.sold ? 'sold-' : 'stock-') + i.shop;
            const target = document.getElementById(containerId);
            if(!target) return;
            target.innerHTML += `
                <div class="item-card ${i.barva.toLowerCase()}">
                    <b>${i.kod}</b>
                    <small>${i.barva} Gold ${i.mm ? i.mm+'mm' : ''}</small>
                    <div class="size-tag">${i.vel}</div>
                    ${i.sold ? `<span class="sold-date">${i.data_shitjes}</span>` : ''}
                    <div class="actions">
                        <button class="btn-act btn-edit" onclick="startEdit(${i.id})">✎</button>
                        ${!i.sold ? `<button class="btn-act btn-sell" onclick="sellItem(${i.id})">SELL</button>` : `<button class="btn-act btn-undo" onclick="undoSell(${i.id})">↺</button><button class="btn-act btn-del" onclick="deleteItem(${i.id})">X</button>`}
                    </div>
                </div>`;
        });
    }
    loadData();
</script>
</body>
</html>
