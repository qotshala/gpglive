<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD POINT - LIVE DATA</title>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #D4AF37; box-sizing: border-box; }
        h1 { font-size: 18px; text-align: center; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        .live-info { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; text-align: center; }
        .live-price { font-size: 24px; color: #00ff00; font-weight: bold; margin-top: 5px; }
        .update-time { font-size: 10px; color: #888; margin-top: 5px; }

        .section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; background: #1a1a1a; border: 1px solid #D4AF37; border-radius: 8px; padding: 12px; color: #fff; font-size: 22px; text-align: center; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        
        .result { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff00; margin-top: 10px; text-align: center; }
        .total-val { color: #00ff00; font-weight: bold; font-size: 28px; }
    </style>
</head>
<body onload="fetchGoldPrice()">

<div class="container">
    <h1>Gold Point Live</h1>

    <div class="live-info">
        <label>Çmimi i Arit (Live nga Bursa)</label>
        <div id="goldLive" class="live-price">Duke u ngarkuar...</div>
        <div id="updateTime" class="update-time"></div>
    </div>

    <div class="section">
        <label>Llogaritësi i Dyqanit</label>
        <input type="number" id="gram" oninput="calculateGold()" placeholder="Gramat (g)" inputmode="decimal">
        <input type="number" id="price" oninput="calculateGold()" placeholder="Çmimi yt për gram (CZK)" inputmode="decimal">
        
        <div class="result">
            <div id="goldTotal" class="total-val">0 CZK</div>
        </div>
    </div>

    <div class="section">
        <label>Këmbimi € -> CZK</label>
        <input type="number" id="eur" oninput="convertValuta()" placeholder="Shuma në €" inputmode="decimal">
        <input type="number" id="kursi" value="25.20" oninput="convertValuta()" placeholder="Kursi" inputmode="decimal">
        
        <div class="result">
            <div id="valutaTotal" class="total-val">0 CZK</div>
        </div>
    </div>
</div>

<script>
    // Funksioni për të marrë çmimin LIVE nga një API publike
    async function fetchGoldPrice() {
        try {
            // Përdorim një API falas (mund të ketë vonesë deri 1-5 min nga bursa reale)
            const response = await fetch('https://api.metals.live/v1/spot');
            const data = await response.json();
            
            // Çmimi vjen për Ounce në USD. E kthejmë në Gram/Euro (Përafërsisht)
            const goldUsdPerOunce = data[0].gold;
            const goldEurPerGram = (goldUsdPerOunce / 31.1035) * 0.92; 

            document.getElementById('goldLive').innerText = goldEurPerGram.toFixed(2) + " € / gram";
            document.getElementById('updateTime').innerText = "Përditësuar: " + new Date().toLocaleTimeString();
        } catch (error) {
            document.getElementById('goldLive').innerText = "Gabim gjatë ngarkimit";
        }
    }

    function calculateGold() {
        const g = parseFloat(document.getElementById('gram').value) || 0;
        const p = parseFloat(document.getElementById('price').value) || 0;
        document.getElementById('goldTotal').innerText = Math.round(g * p).toLocaleString() + " CZK";
    }

    function convertValuta() {
        const e = parseFloat(document.getElementById('eur').value) || 0;
        const k = parseFloat(document.getElementById('kursi').value) || 25.20;
        document.getElementById('valutaTotal').innerText = Math.round(e * k).toLocaleString() + " CZK";
    }

    // Rifresko çmimin çdo 5 minuta automatikisht
    setInterval(fetchGoldPrice, 300000);
</script>

</body>
</html>
