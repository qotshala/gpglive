<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLD POINT LIVE</title>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #111; border: 1px solid #D4AF37; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 3px; font-size: 16px; margin-bottom: 25px; color: #D4AF37; }
        .section { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid #D4AF37; }
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .price-row:last-child { border-bottom: none; }
        .label { color: #888; font-size: 13px; text-transform: uppercase; }
        .value { color: #fff; font-weight: bold; font-size: 22px; }
        .converter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        input { width: 100%; background: #222; border: 1px solid #333; border-radius: 12px; padding: 15px; color: #fff; font-size: 20px; outline: none; box-sizing: border-box; -webkit-appearance: none; }
        input:focus { border-color: #D4AF37; }
        .unit-label { font-size: 11px; color: #D4AF37; margin-bottom: 5px; display: block; font-weight: bold; text-transform: uppercase; }
        #status { font-size: 10px; color: #555; text-align: center; margin-top: 15px; }
        .gold-v { color: #D4AF37; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gold Point Live</h1>

    <div class="section">
        <div class="price-row">
            <span class="label">AU 24K <small>(gram/€)</small></span>
            <span class="value gold-v" id="gold24">---</span>
        </div>
        <div class="price-row">
            <span class="label">AU 14K <small>(gram/€)</small></span>
            <span class="value gold-v" id="gold14">---</span>
        </div>
    </div>

    <div class="section">
        <div class="price-row">
            <span class="label">EUR / CZK</span>
            <span class="value" id="eur-val">...</span>
        </div>
        <div class="price-row">
            <span class="label">USD / CZK</span>
            <span class="value" id="usd-val">...</span>
        </div>
    </div>

    <div class="section">
        <span class="label" style="display:block; margin-bottom:10px;">Këmbimi EUR ⇄ CZK</span>
        <div class="converter-grid">
            <div>
                <span class="unit-label">EURO (€)</span>
                <input type="number" id="inEUR" placeholder="0" oninput="convEUR()" inputmode="decimal">
            </div>
            <div>
                <span class="unit-label">CZK</span>
                <input type="number" id="inCZK" placeholder="0" oninput="convCZK()" inputmode="decimal">
            </div>
        </div>
    </div>

    <div class="section">
        <span class="label" style="display:block; margin-bottom:10px;">Këmbimi USD ⇄ CZK</span>
        <div class="converter-grid">
            <div>
                <span class="unit-label">USD ($)</span>
                <input type="number" id="inUSD" placeholder="0" oninput="convUSD_to_CZK()" inputmode="decimal">
            </div>
            <div>
                <span class="unit-label">CZK</span>
                <input type="number" id="inCZK2" placeholder="0" oninput="convCZK_to_USD()" inputmode="decimal">
            </div>
        </div>
    </div>

    <div id="status">Duke u lidhur me bursën...</div>
</div>

<script>
    let rateEUR = 24.44; 
    let rateUSD = 21.33;

    async function updateRates() {
        try {
            // Përdorim një URL që GitHub e lejon pa bllokim
            const response = await fetch('https://open.er-api.com/v6/latest/EUR');
            const data = await response.json();
            
            rateEUR = data.rates.CZK;
            rateUSD = rateEUR / data.rates.USD;
            
            // Llogaritja e arit nga bursa (XAU)
            const goldGramEUR = (1 / data.rates.XAU) / 31.1035;

            document.getElementById('eur-val').innerText = rateEUR.toFixed(2);
            document.getElementById('usd-val').innerText = rateUSD.toFixed(2);
            document.getElementById('gold24').innerText = goldGramEUR.toFixed(2) + " €";
            document.getElementById('gold14').innerText = (goldGramEUR * 0.585).toFixed(2) + " €";
            
            document.getElementById('status').innerText = "LIVE • " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('status').innerText = "Rifresko faqen për çmimet e reja.";
        }
    }

    function convEUR() {
        let v = document.getElementById('inEUR').value;
        document.getElementById('inCZK').value = (v * rateEUR).toFixed(2);
    }
    function convCZK() {
        let v = document.getElementById('inCZK').value;
        document.getElementById('inEUR').value = (v / rateEUR).toFixed(2);
    }
    function convUSD_to_CZK() {
        let v = document.getElementById('inUSD').value;
        document.getElementById('inCZK2').value = (v * rateUSD).toFixed(2);
    }
    function convCZK_to_USD() {
        let v = document.getElementById('inCZK2').value;
        document.getElementById('inUSD').value = (v / rateUSD).toFixed(2);
    }

    updateRates();
    setInterval(updateRates, 60000);
</script>

</body>
</html>
